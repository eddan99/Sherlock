services:
  backend:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend/
      dockerfile: Dockerfile
    restart: always
    ports:
      - "4173:4173"
    depends_on:
      - backend